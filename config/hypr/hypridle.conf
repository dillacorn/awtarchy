# awtarchy hypridle config
# github.com/dillacorn/awtarchy/tree/main/config/hypr
# ~/.config/hypr/hypridle.conf

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = ~/.config/hypr/scripts/hypridle_action.sh prepare-sleep
    after_sleep_cmd = ~/.config/hypr/scripts/hypridle_action.sh resume-sleep
    # Ignore application-provided idle inhibitors globally.
    # Waybar, active games, and active video playback are enforced by hypridle_action.sh.
    ignore_dbus_inhibit = true
    ignore_systemd_inhibit = true
    ignore_wayland_inhibit = true
    inhibit_sleep = 2

    # Waybar restore after successful hyprlock unlock
    on_unlock_cmd = ~/.config/hypr/scripts/waybar_restore_resume.sh

    # Optional: also toggle Waybar when the session locks
    # on_lock_cmd = ~/.config/hypr/scripts/waybar_toggle_idle.sh
}

# toggle Waybar
listener {
    timeout = 60 # 1 minute
    on-timeout = ~/.config/hypr/scripts/hypridle_action.sh waybar-hide
    on-resume  = ~/.config/hypr/scripts/waybar_restore_resume.sh
    ignore_inhibit = false
}

# dim external monitor via DDC
listener {
    timeout = 120 # 2 minutes
    on-timeout = ~/.config/hypr/scripts/hypridle_action.sh dim
    on-resume  = ~/.config/hypr/scripts/restore_brightness.sh
    ignore_inhibit = false
}

# lock session
listener {
    timeout = 180 # 3 minutes
    on-timeout = ~/.config/hypr/scripts/hypridle_action.sh lock
    ignore_inhibit = false
}

# DPMS off/on
listener {
    timeout = 240 # 4 minutes
    on-timeout = ~/.config/hypr/scripts/hypridle_action.sh dpms-off
    on-resume  = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
    ignore_inhibit = false
}

# suspend
listener {
    timeout = 540 # 9 minutes
    on-timeout = ~/.config/hypr/scripts/hypridle_action.sh suspend
    ignore_inhibit = false
}
